<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altersstruktur Graubünden — Karte</title>
<base target="_parent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a1a; }

  /* ── Hero ── */
  .hero { height: auto; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 24px 12px; max-width: 720px; margin: 0 auto; }
  .hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 800; line-height: 1.15; margin-bottom: 12px; }
  .hero .lead { font-size: 17px; color: #555; line-height: 1.5; max-width: 540px; }
  .hero .scroll-hint { margin-top: 24px; font-size: 13px; color: #999; }
  .hero .scroll-hint span { display: inline-block; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(6px) } }

  /* ── Scrolly Section ── */
  .scrolly { position: relative; }
  .scrolly__steps { position: relative; z-index: 2; pointer-events: none; }
  .scrolly__step { min-height: 85vh; display: flex; align-items: center; padding: 20px 5vw; }
  .scrolly__step:nth-child(odd) { justify-content: flex-end; }
  .scrolly__step:nth-child(even) { justify-content: flex-start; }
  .scrolly__step:first-child { min-height: 5vh; }
  .scrolly__step:last-child { min-height: 90vh; }
  .text-box { background: none; color: #1a1a1a; padding: 24px 28px; max-width: 340px; font-size: 15px; line-height: 1.6; text-shadow: none; opacity: 0; transform: translateY(12px); transition: all 0.4s ease; pointer-events: auto; }
  .text-box.active { opacity: 1; transform: translateY(0); }
  .text-box h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #444; }
  .text-box .highlight { font-size: 28px; font-weight: 800; color: #1a9e5a; display: block; margin: 4px 0 8px; }
  .text-box .highlight.red { color: #EE7733; }
  .text-box .highlight.blue { color: #0068A4; }

  /* ── Viz Canvas ── */
  #viz { width: 90vw; max-width: 900px; padding: 10px; position: relative; }
  #bubble-svg { width: 100%; height: auto; }
  .bubble { transition: all 0.6s ease; cursor: pointer; }
  .bubble:hover { filter: brightness(1.3); }
  .axis text { fill: #999; font-size: 11px; }
  .axis line, .axis path { stroke: #ddd; }
  .ref-line { stroke: #bbb; stroke-width: 1; stroke-dasharray: 4 3; }
  .ref-label { fill: #999; font-size: 10px; }
  .bubble-label { fill: #333; font-size: 9px; font-weight: 600; pointer-events: none; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }

  /* ── Tooltip ── */
  .tooltip { position: absolute; background: rgba(255,255,255,0.97); backdrop-filter: blur(6px); color: #1a1a1a; border-radius: 8px; padding: 12px 14px; font-size: 12px; line-height: 1.5; box-shadow: 0 4px 16px rgba(0,0,0,0.4); pointer-events: none; z-index: 20; display: none; max-width: 220px; }
  .tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .tooltip .tt-row { display: flex; justify-content: space-between; gap: 10px; }
  .tooltip .tt-k { color: #666; }
  .tooltip .tt-v { font-weight: 600; }

  /* ── Pyramid (shown in step) ── */
  #pyramid-container { width: 90vw; max-width: 700px; }
  .pyr-row { display: flex; align-items: center; margin-bottom: 2px; height: 18px; }
  .pyr-label { width: 80px; font-size: 10px; text-align: center; color: #666; flex-shrink: 0; }
  .pyr-side { flex: 1; display: flex; align-items: center; }
  .pyr-side-m { justify-content: flex-end; }
  .pyr-side-f { justify-content: flex-start; }
  .pyr-bar { height: 14px; transition: width 0.5s ease; }
  .pyr-bar-m { background: #0068A4; border-radius: 3px 0 0 3px; }
  .pyr-bar-f { background: #EE7733; border-radius: 0 3px 3px 0; }
  .pyr-val { font-size: 9px; color: #555; width: 28px; flex-shrink: 0; }
  .pyr-val-m { text-align: right; padding-right: 4px; }
  .pyr-val-f { text-align: left; padding-left: 4px; }
  .pyr-legend { display: flex; gap: 16px; margin-bottom: 10px; justify-content: center; }
  .pyr-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .pyr-legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .pyr-title { font-size: 14px; color: #333; text-align: center; margin-bottom: 8px; font-weight: 600; }

  /* ── Ranking bars ── */
  #ranking-container { width: 90vw; max-width: 700px; }
  .rank-title { font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: 600; }
  .rank-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .rank-name { width: 140px; color: #333; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-bar-wrap { flex: 1; height: 16px; background: rgba(0,0,0,0.04); border-radius: 3px; overflow: hidden; margin: 0 8px; }
  .rank-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .rank-val { width: 50px; text-align: right; color: #aaa; font-weight: 600; }

  /* ── Search Section ── */
  .search-section { max-width: 720px; margin: 0 auto; padding: 80px 24px 40px; }
  .search-section h2 { font-size: 24px; margin-bottom: 8px; }
  .search-wrap { position: relative; max-width: 400px; }
  #search-input { width: 100%; padding: 12px 16px; font-size: 16px; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; color: #1a1a1a; outline: none; }
  #search-input:focus { border-color: rgba(0,0,0,0.3); }
  .search-results { position: absolute; top: 100%; left: 0; right: 0; background: #f5f5f5; border: 1px solid rgba(0,0,0,0.1); border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; display: none; z-index: 10; }
  .search-results.open { display: block; }
  .search-item { padding: 10px 16px; cursor: pointer; font-size: 14px; color: #444; }
  .search-item:hover, .search-item.selected { background: rgba(0,0,0,0.06); color: #1a1a1a; }
  .gemeinde-card { display: none; margin-top: 24px; padding: 28px; background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; }
  .gemeinde-card.visible { display: block; }
  .gc-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .gc-stats { display: flex; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
  .gc-stat { text-align: center; }
  .gc-stat .val { font-size: 28px; font-weight: 800; }
  .gc-stat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .gc-rank { font-size: 12px; color: #888; margin-top: 12px; }
  .gc-pyr { margin-top: 20px; max-width: 500px; }

  /* ── Outro ── */
  .outro { max-width: 720px; margin: 0 auto; padding: 80px 24px 120px; }
  .outro h2 { font-size: 24px; margin-bottom: 16px; }
  .outro p { font-size: 15px; color: #aaa; line-height: 1.6; margin-bottom: 12px; }
  .outro .source { font-size: 12px; color: #999; margin-top: 24px; }

  /* ── Progress Dots ── */
  .progress-dots { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); z-index: 30; display: flex; flex-direction: column; gap: 12px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
  .progress-dots.visible { opacity: 1; pointer-events: auto; }
  .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.12); border: 1.5px solid rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s ease; position: relative; }
  .progress-dot.active { background: #5cd68f; border-color: #1a9e5a; transform: scale(1.4); }
  .progress-dot:hover { background: rgba(0,0,0,0.3); }
  .dot-label { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.97); color: #333; padding: 4px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
  .progress-dot:hover .dot-label { opacity: 1; }

  /* ── Time Slider ── */
  .time-slider-wrap { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
  .time-slider-wrap.visible { opacity: 1; pointer-events: auto; }
  .time-slider-wrap label { font-size: 11px; color: #888; }
  .time-slider-year { font-size: 20px; font-weight: 800; color: #1a9e5a; min-width: 50px; text-align: center; }
  #time-slider { -webkit-appearance: none; width: 180px; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; outline: none; cursor: pointer; }
  #time-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #5cd68f; cursor: pointer; }
  #time-slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #5cd68f; border: none; cursor: pointer; }
  .time-play-btn { background: none; border: 1px solid rgba(0,0,0,0.15); color: #555; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .time-play-btn:hover { border-color: #0068A4; color: #0068A4; }

  /* ── Sparklines ── */
  .sparkline-wrap { margin-top: 16px; display: flex; gap: 24px; flex-wrap: wrap; }
  .sparkline-item { flex: 1; min-width: 140px; }
  .sparkline-item .spark-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .sparkline-item svg { width: 100%; height: 36px; }
  .sparkline-item .spark-range { font-size: 9px; color: #999; display: flex; justify-content: space-between; margin-top: 2px; }

  /* ── Viz Transitions ── */
  .scrolly__sticky { position: sticky; top: 0; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; z-index: 1; overflow: hidden; }
  #viz, #pyramid-container, #ranking-container { position: absolute; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0s 0.4s; }
  #viz.visible, #pyramid-container.visible, #ranking-container.visible { opacity: 1; visibility: visible; transition: opacity 0.4s ease, visibility 0s 0s; }
  #bubble-svg { transition: opacity 0.25s ease; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .scrolly__sticky { align-items: flex-start; padding-top: 8px; }
    /* Text-Boxen: unten fixiert mit dunklem Hintergrund */
    .scrolly__step { align-items: flex-end; padding-bottom: 10px; min-height: 90vh; }
    .scrolly__step:first-child { min-height: 10vh; }
    .scrolly__step:last-child { min-height: 100vh; }
    .scrolly__step:nth-child(odd),
    .scrolly__step:nth-child(even) { justify-content: center; }
    .text-box { max-width: 92vw; padding: 14px 16px; font-size: 13px; line-height: 1.5; background: rgba(255,255,255,0.92); backdrop-filter: blur(6px); border-radius: 10px; border: 1px solid rgba(0,0,0,0.08); text-shadow: none; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .text-box h3 { font-size: 12px; }
    .text-box .highlight { font-size: 20px; }
    .progress-dots { right: 6px; gap: 8px; }
    .progress-dot { width: 7px; height: 7px; }
    .dot-label { display: none; }
    .rank-name { width: 100px; font-size: 11px; }
    .rank-val { width: 40px; font-size: 11px; }
    .rank-bar-wrap { margin: 0 4px; }
    #ranking-container { width: 95vw; padding: 0 4px; }
    .dual-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
    #time-slider { width: 120px; }
    .time-slider-year { font-size: 16px; }
    .time-slider-wrap { top: 6px; }
    /* Pyramide und Viz etwas höher positionieren */
    #pyramid-container { max-height: 85vh; overflow-y: auto; padding-top: 8px; }
    #viz { width: 96vw; }
  }
</style>

const TIMESERIES = TIMESERIES_RAW;

// Build per-year lookup for bubble chart
function getDataForYear(year) {
  return DATA.gemeinden.map(g => {
    const ts = TIMESERIES[g.gemeinde];
    if (!ts) return g; // fallback to 2024
    const entry = ts.find(e => e[0] === year);
    if (!entry) return g;
    return { gemeinde: g.gemeinde, total: entry[1], avg_age: entry[2], male_pct: entry[3], pyramid: g.pyramid };
  });
}

// Compute aging speed (2010→2024)
const AGING_SPEED = DATA.gemeinden.map(g => {
  const ts = TIMESERIES[g.gemeinde];
  if (!ts) return null;
  const y2010 = ts.find(e => e[0] === 2010);
  const y2024 = ts.find(e => e[0] === 2024);
  if (!y2010 || !y2024) return null;
  return { gemeinde: g.gemeinde, change: +(y2024[2] - y2010[2]).toFixed(1), from: y2010[2], to: y2024[2] };
}).filter(Boolean).sort((a, b) => b.change - a.change);

let svgEl, width, height;
const isMobileMargin = window.innerWidth <= 600;
const margin = { top: isMobileMargin ? 30 : 50, right: 20, bottom: isMobileMargin ? 30 : 40, left: isMobileMargin ? 40 : 50 };
let activeStep = -1;
let prevContainer = null;
let currentYear = 2024;
let isProfileView = false;
const timeHighlights = ['Felsberg', 'Buseno', 'Celerina/Schlarigna'];
let timePlayInterval = null;

function init() {
  setupViz();
  buildProgressDots();
  setupTimeSlider();
  setupObserver();
  setupSearch();
  updateViz(0);
  window.addEventListener('resize', () => { if (isProfileView) return; setupViz(); updateViz(activeStep); });
}

// ── Progress Dots ──
function buildProgressDots() {
  const dotsEl = document.getElementById('progress-dots');
  const titles = [];
  document.querySelectorAll('.scrolly__step .text-box h3').forEach(h3 => titles.push(h3.textContent));
  // Fallback for steps without h3
  while (titles.length < document.querySelectorAll('.scrolly__step').length) titles.push('Schritt ' + (titles.length + 1));

  dotsEl.innerHTML = titles.map((t, i) =>
    `<div class="progress-dot" data-step="${i}"><span class="dot-label">${t}</span></div>`
  ).join('');

  dotsEl.querySelectorAll('.progress-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const step = parseInt(dot.dataset.step);
      const target = document.querySelector(`.scrolly__step[data-step="${step}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  });

  // Show dots only when scrolly section is in viewport
  const scrolly = document.getElementById('scrolly');
  const dotsObserver = new IntersectionObserver(entries => {
    entries.forEach(e => dotsEl.classList.toggle('visible', e.isIntersecting));
  }, { threshold: 0.05 });
  dotsObserver.observe(scrolly);
}

function updateProgressDots(step) {
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === step);
  });
}

function setupViz() {
  svgEl = document.getElementById('bubble-svg');
  const container = document.getElementById('viz');
  width = container.clientWidth;
  const isMobile = window.innerWidth <= 600;
  // In embed mode (no scrolly steps visible), use a taller ratio for readability
  const isEmbed = !document.querySelector('.scrolly__steps') || getComputedStyle(document.querySelector('.scrolly__steps')).display === 'none';
  if (isEmbed) {
    height = isMobile
      ? Math.max(width * 1.1, 360)
      : Math.min(width * 0.75, 650);
  } else {
    height = isMobile
      ? window.innerHeight * 0.7
      : Math.min(width * 0.85, window.innerHeight * 0.8);
  }
  svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svgEl.setAttribute('width', width);
  svgEl.setAttribute('height', height);
}

// X = Männeranteil (links Männer, rechts Frauen — wie bei Pyramide)
function scaleX(val) {
  const min = 44, max = 58;
  return margin.left + ((max - val) / (max - min)) * (width - margin.left - margin.right);
}
// Y = Durchschnittsalter (unten jung, oben alt)
function scaleY(val) {
  const min = 39, max = 59;
  return margin.top + ((max - val) / (max - min)) * (height - margin.top - margin.bottom);
}
function scaleR(pop) {
  const maxPop = Math.max(...DATA.gemeinden.map(g => g.total));
  const maxR = window.innerWidth <= 600 ? 20 : 28;
  return 3 + Math.sqrt(pop / maxPop) * maxR;
}

function drawBubbles(highlights = [], dim = false, colorFn = null, year = null) {
  const gemeinden = year ? getDataForYear(year) : DATA.gemeinden;
  const mob = window.innerWidth <= 600;
  const axisFontSize = mob ? 8 : 10;
  const labelFontSize = mob ? 9 : 11;

  let svg = '';
  // Grid: X = Männeranteil, Y = Alter
  for (let p = 44; p <= 58; p += 2) {
    const x = scaleX(p);
    svg += `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="#e8e8e8" stroke-width="1"/>`;
    svg += `<text x="${x}" y="${height - margin.bottom + 14}" text-anchor="middle" class="axis text" fill="#aaa" font-size="${axisFontSize}">${p}%</text>`;
  }
  for (let a = 40; a <= 58; a += 2) {
    const y = scaleY(a);
    svg += `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e8e8e8" stroke-width="1"/>`;
    svg += `<text x="${margin.left - 6}" y="${y + 3}" text-anchor="end" fill="#aaa" font-size="${axisFontSize}">${a}</text>`;
  }
  // Axis labels
  svg += `<text x="${width / 2}" y="${height - 4}" text-anchor="middle" fill="#999" font-size="${labelFontSize}">${mob ? '← Männer · Männeranteil · Frauen →' : '← mehr Männer · Männeranteil · mehr Frauen →'}</text>`;
  svg += `<text x="12" y="${height / 2}" text-anchor="middle" fill="#999" font-size="${labelFontSize}" transform="rotate(-90, 12, ${height / 2})">${mob ? '← jung · Alter · alt →' : '← jung · Durchschnittsalter · alt →'}</text>`;

  // Reference lines (2024 canton averages)
  const refX = scaleX(DATA.meta.gr_male_pct);
  const refY = scaleY(DATA.meta.gr_avg_age);
  svg += `<line x1="${refX}" y1="${margin.top}" x2="${refX}" y2="${height - margin.bottom}" class="ref-line"/>`;
  svg += `<text x="${refX + 4}" y="${margin.top + 12}" class="ref-label">${DATA.meta.gr_male_pct.toFixed(1)}%</text>`;
  svg += `<line x1="${margin.left}" y1="${refY}" x2="${width - margin.right}" y2="${refY}" class="ref-line"/>`;
  svg += `<text x="${width - margin.right - 4}" y="${refY - 4}" class="ref-label" text-anchor="end">⌀ ${DATA.meta.gr_avg_age.toFixed(1)} J.</text>`;

  // Bubbles: X = male_pct, Y = avg_age
  const sorted = [...gemeinden].sort((a, b) => b.total - a.total);
  sorted.forEach(g => {
    const x = scaleX(g.male_pct);
    const y = scaleY(g.avg_age);
    const r = scaleR(g.total);
    const isHighlight = highlights.includes(g.gemeinde);
    let opacity = dim ? (isHighlight ? 0.95 : 0.12) : (isHighlight ? 0.9 : 0.55);
    let fill = '#0068A4';
    if (colorFn) fill = colorFn(g);
    if (isHighlight) fill = colorFn ? colorFn(g) : '#ff9e2c';
    const hr = isHighlight ? Math.max(r, 8) : r;
    svg += `<circle cx="${x}" cy="${y}" r="${hr}" fill="${fill}" opacity="${opacity}" class="bubble" stroke="${isHighlight ? '#333' : 'none'}" stroke-width="${isHighlight ? 2 : 0}" data-gemeinde="${g.gemeinde}" data-age="${g.avg_age}" data-male="${g.male_pct}" data-pop="${g.total}"/>`;
    const labelThreshold = mob ? 5000 : 3000;
    const bubbleLabelSize = mob ? 7 : 9;
    if (isHighlight || (!dim && g.total > labelThreshold)) {
      const labelY = isHighlight ? y - hr - 3 : y + 3;
      svg += `<text x="${x}" y="${labelY}" text-anchor="middle" class="bubble-label" font-size="${bubbleLabelSize}">${g.gemeinde}</text>`;
    }
  });
  svgEl.innerHTML = svg;
  setupBubbleInteraction();
}

// ── Bubble interactivity: tooltip + click ──
function setupBubbleInteraction() {
  const svgEl = document.getElementById('bubble-svg');
  const tooltip = document.getElementById('tooltip');
  if (!svgEl || !tooltip) return;

  svgEl.addEventListener('mousemove', e => {
    const bubble = e.target.closest('.bubble');
    if (!bubble) { tooltip.style.display = 'none'; return; }

    const name = bubble.getAttribute('data-gemeinde');
    const age = parseFloat(bubble.getAttribute('data-age')).toFixed(1);
    const male = parseFloat(bubble.getAttribute('data-male')).toFixed(1);
    const pop = parseInt(bubble.getAttribute('data-pop')).toLocaleString('de-CH');

    tooltip.innerHTML = `
      <div class="tt-name">${name}</div>
      <div class="tt-row"><span class="tt-k">Einwohner</span><span class="tt-v">${pop}</span></div>
      <div class="tt-row"><span class="tt-k">Ø Alter</span><span class="tt-v">${age}</span></div>
      <div class="tt-row"><span class="tt-k">Männeranteil</span><span class="tt-v">${male}%</span></div>`;
    tooltip.style.display = 'block';

    const vizRect = document.getElementById('viz').getBoundingClientRect();
    let left = e.clientX - vizRect.left + 12;
    let top = e.clientY - vizRect.top - 10;
    if (left + 220 > vizRect.width) left = left - 240;
    if (top < 0) top = 10;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  });

  svgEl.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  svgEl.addEventListener('click', e => {
    const bubble = e.target.closest('.bubble');
    if (!bubble) return;
    const name = bubble.getAttribute('data-gemeinde');
    const g = DATA.gemeinden.find(x => x.gemeinde === name);
    if (g && g.pyramid) {
      hideAll();
      showGemeindeProfile(name);
    }
  });
}

// ── Full Gemeinde profile (reused by bubble click and search) ──
function buildGemeindeProfileHTML(name) {
  const g = DATA.gemeinden.find(x => x.gemeinde === name);
  if (!g) return '';

  const byAge = [...DATA.gemeinden].sort((a, b) => a.avg_age - b.avg_age);
  const byPop = [...DATA.gemeinden].sort((a, b) => b.total - a.total);
  const ageRank = byAge.findIndex(x => x.gemeinde === name) + 1;
  const popRank = byPop.findIndex(x => x.gemeinde === name) + 1;
  const total = DATA.gemeinden.length;

  let ageColor = g.avg_age < 44 ? '#0068A4' : g.avg_age > 50 ? '#EE7733' : '#333';
  let maleColor = g.male_pct > 50 ? '#0068A4' : '#EE7733';

  let html = `<div class="gc-name">${g.gemeinde}</div>`;
  html += `<div class="gc-stats">`;
  html += `<div class="gc-stat"><div class="val">${g.total.toLocaleString('de-CH')}</div><div class="lbl">Einwohner</div></div>`;
  html += `<div class="gc-stat"><div class="val" style="color:${ageColor}">${g.avg_age.toFixed(1)}</div><div class="lbl">Ø Alter</div></div>`;
  html += `<div class="gc-stat"><div class="val" style="color:${maleColor}">${g.male_pct.toFixed(1)}%</div><div class="lbl">Männeranteil</div></div>`;
  // 100+ year olds from pyramid data (last entry)
  if (g.pyramid) {
    const over100 = g.pyramid[g.pyramid.length - 1];
    const n100 = over100.m + over100.f;
    if (n100 > 0) {
      html += `<div class="gc-stat"><div class="val" style="color:#1a9e5a">${n100}</div><div class="lbl">100+ Jahre</div></div>`;
    }
  }
  html += `</div>`;
  html += `<div class="gc-rank">Rang ${ageRank} von ${total} (jüngste zuerst) · ${popRank}. grösste Gemeinde</div>`;

  const ts = TIMESERIES[name];
  if (ts && ts.length > 1) {
    html += buildSparklines(ts);
  }

  if (g.pyramid) {
    const maxVal = Math.max(...g.pyramid.map(p => Math.max(p.m, p.f)));
    html += `<div class="gc-pyr">`;
    html += `<div style="font-size:13px;color:#888;margin-bottom:8px;font-weight:600">Alterspyramide</div>`;
    html += `<div class="pyr-legend"><div class="pyr-legend-item"><div class="pyr-legend-dot" style="background:#0068A4"></div> Männer</div><div class="pyr-legend-item"><div class="pyr-legend-dot" style="background:#EE7733"></div> Frauen</div></div>`;
    g.pyramid.slice().reverse().forEach(p => {
      const wm = (p.m / maxVal * 100).toFixed(1);
      const wf = (p.f / maxVal * 100).toFixed(1);
      html += `<div class="pyr-row"><div class="pyr-side pyr-side-m"><span class="pyr-val pyr-val-m">${p.m}</span><div class="pyr-bar pyr-bar-m" style="width:${wm}%"></div></div><div class="pyr-label">${p.klasse.replace(' Jahre','').replace(' und mehr','+')}</div><div class="pyr-side pyr-side-f"><div class="pyr-bar pyr-bar-f" style="width:${wf}%"></div><span class="pyr-val pyr-val-f">${p.f}</span></div></div>`;
    });
    html += `</div>`;
  }
  return html;
}

function showDualPyramid(name1, name2) {
  const container = document.getElementById('pyramid-container');
  container.classList.add('visible');
  const el = document.getElementById('pyramid');
  const title = document.getElementById('pyr-title');

  const g1 = DATA.gemeinden.find(x => x.gemeinde === name1);
  const g2 = DATA.gemeinden.find(x => x.gemeinde === name2);
  title.textContent = `${name1} vs. ${name2}`;

  const pyr1 = g1.pyramid;
  const pyr2 = g2.pyramid;
  // Each pyramid gets its OWN scale so shapes are comparable
  const max1 = Math.max(...pyr1.map(p => Math.max(p.m, p.f)));
  const max2 = Math.max(...pyr2.map(p => Math.max(p.m, p.f)));

  function renderPyr(pyr, maxV, name, total) {
    let h = `<div><div style="text-align:center;font-size:12px;color:#555;margin-bottom:6px">${name} (${total.toLocaleString('de-CH')} EW)</div>`;
    pyr.slice().reverse().forEach(p => {
      const wm = (p.m / maxV * 100).toFixed(1);
      const wf = (p.f / maxV * 100).toFixed(1);
      h += `<div class="pyr-row"><div class="pyr-side pyr-side-m"><span class="pyr-val pyr-val-m">${p.m}</span><div class="pyr-bar pyr-bar-m" style="width:${wm}%"></div></div><div class="pyr-label" style="font-size:8px">${p.klasse.replace(' Jahre','').replace(' und mehr','+')}</div><div class="pyr-side pyr-side-f"><div class="pyr-bar pyr-bar-f" style="width:${wf}%"></div><span class="pyr-val pyr-val-f">${p.f}</span></div></div>`;
    });
    h += `</div>`;
    return h;
  }

  let html = `<div class="dual-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">`;
  html += renderPyr(pyr1, max1, name1, g1.total);
  html += renderPyr(pyr2, max2, name2, g2.total);
  html += `</div>`;
  html += `<div style="text-align:center;font-size:10px;color:#888;margin-top:8px">Balken relativ zum jeweiligen Maximum — Form vergleichen, nicht Grösse</div>`;
  el.innerHTML = html;
}

function setupTimeSlider() {

function updateViz(step) {
  updateProgressDots(step);
  const nextContainer = getContainerForStep(step);
  const sameContainer = prevContainer === nextContainer;

  // Stop time animation when leaving step 6
  if (activeStep === 6 && step !== 6 && timePlayInterval) {
    clearInterval(timePlayInterval);
    timePlayInterval = null;
    document.getElementById('time-play-btn').innerHTML = '&#9654;';
  }

  if (!sameContainer) {
    hideAll();
  }
  showTimeSlider(step === 6);
  prevContainer = nextContainer;

  switch(step) {
    case 0:
      showViz();
      if (sameContainer) fadeBubbles(() => drawBubbles([], false));
      else drawBubbles([], false);
      break;

    case 1:
      showViz();
      if (sameContainer) fadeBubbles(() => drawBubbles([], false));
      else drawBubbles([], false);
      break;

    case 2:
      showViz();
      if (sameContainer) fadeBubbles(() => drawBubbles(['Felsberg'], true));
      else drawBubbles(['Felsberg'], true);
      break;

    case 3:
      showViz();
      if (sameContainer) fadeBubbles(() => drawBubbles(['Buseno', 'Santa Maria in Calanca', 'Rossa', 'Calanca'], true, g => g.avg_age > 53 ? '#EE7733' : '#0068A4'));
      else drawBubbles(['Buseno', 'Santa Maria in Calanca', 'Rossa', 'Calanca'], true, g => g.avg_age > 53 ? '#EE7733' : '#0068A4');
      break;

    case 4:
      showPyramid(null);
      break;

    case 5:
      showDualRanking('avg_age', 10);
      break;

    case 6: // Time slider
      showViz();
      if (!timePlayInterval) {
        currentYear = 2024;
        document.getElementById('time-slider').value = 2024;
        document.getElementById('time-slider-year').textContent = '2024';
        drawBubbles(timeHighlights, false, null, currentYear);
      }
      break;

    case 7: // Aging speed ranking
      showAgingRanking();
      break;
  }
}

// ── Intersection Observer for scroll-driven steps ──
function setupObserver() {
  const steps = document.querySelectorAll('.scrolly__step');
  const boxes = document.querySelectorAll('.text-box');

  const observer = new IntersectionObserver(entries => {
    if (isProfileView) return; // Block step changes while profile is open
    entries.forEach(entry => {
      const step = parseInt(entry.target.dataset.step);
      const box = entry.target.querySelector('.text-box');

      if (entry.isIntersecting) {
        if (step !== activeStep) {
          activeStep = step;
          updateViz(step);
        }
        box.classList.add('active');
      } else {
        box.classList.remove('active');
      }
    });
  }, {
    root: null,
    // Trigger when step crosses a line 40% down from the top of the viewport
    rootMargin: '-30% 0px -60% 0px',
    threshold: 0
  });

  steps.forEach(s => observer.observe(s));
}

// ── Gemeinde Search ──
// ── Sparklines for Gemeinde card ──
function buildSparklines(ts) {
  function sparkSVG(values, color) {
    const w = 160, h = 32, pad = 2;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const points = values.map((v, i) => {
      const x = pad + (i / (values.length - 1)) * (w - 2 * pad);
      const y = h - pad - ((v - min) / range) * (h - 2 * pad);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="${points[points.length-1].split(',')[0]}" cy="${points[points.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  const ages = ts.map(e => e[2]);
  const males = ts.map(e => e[3]);
  const pops = ts.map(e => e[1]);
  const firstYear = ts[0][0], lastYear = ts[ts.length-1][0];

  let html = `<div class="sparkline-wrap">`;
  html += `<div class="sparkline-item">
    <div class="spark-label">Ø Alter</div>
    ${sparkSVG(ages, '#EE7733')}
    <div class="spark-range"><span>${firstYear}: ${ages[0]}</span><span>${lastYear}: ${ages[ages.length-1]}</span></div>
  </div>`;
  html += `<div class="sparkline-item">
    <div class="spark-label">Männeranteil %</div>
    ${sparkSVG(males, '#0068A4')}
    <div class="spark-range"><span>${firstYear}: ${males[0]}%</span><span>${lastYear}: ${males[males.length-1]}%</span></div>
  </div>`;
  html += `<div class="sparkline-item">
    <div class="spark-label">Einwohner</div>
    ${sparkSVG(pops, '#1a9e5a')}
    <div class="spark-range"><span>${firstYear}: ${pops[0].toLocaleString('de-CH')}</span><span>${lastYear}: ${pops[pops.length-1].toLocaleString('de-CH')}</span></div>
  </div>`;
  html += `</div>`;
  return html;
}

function setupSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const card = document.getElementById('gemeinde-card');
  const names = DATA.gemeinden.map(g => g.gemeinde).sort();

  // Sorted by age for rank calculation
  const byAge = [...DATA.gemeinden].sort((a, b) => a.avg_age - b.avg_age);
  const byPop = [...DATA.gemeinden].sort((a, b) => b.total - a.total);

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 1) { results.classList.remove('open'); return; }
    const matches = names.filter(n => n.toLowerCase().includes(q)).slice(0, 8);
    if (!matches.length) { results.classList.remove('open'); return; }
    results.innerHTML = matches.map(n => `<div class="search-item" data-name="${n}">${n}</div>`).join('');
    results.classList.add('open');
  });

  results.addEventListener('click', e => {
    const item = e.target.closest('.search-item');
    if (!item) return;
    const name = item.dataset.name;
    input.value = name;
    results.classList.remove('open');
    showGemeindeCard(name);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = results.querySelector('.search-item');
      if (first) { input.value = first.dataset.name; results.classList.remove('open'); showGemeindeCard(first.dataset.name); }
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });

  function showGemeindeCard(name) {
    const html = buildGemeindeProfileHTML(name);
    if (!html) return;
    card.innerHTML = html;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

init();
</script>


<script>
(function(){
  // Tabs for bubble chart variants
  var slot = document.getElementById('embed-controls-slot');
  slot.innerHTML = '<div class="embed-tabs">' +
    '<button class="embed-tab active" data-mode="overview">Übersicht</button>' +
    '<button class="embed-tab" data-mode="youngest">Jüngste</button>' +
    '<button class="embed-tab" data-mode="oldest">Älteste</button>' +
    '<button class="embed-tab" data-mode="change">Wandel 2010–2024</button>' +
    '</div>' +
    '<div class="embed-controls">' +
      '<input list="bubble-gemeinde-list" id="bubble-search" placeholder="Gemeinde suchen…" autocomplete="off" />' +
      '<datalist id="bubble-gemeinde-list">' +
        DATA.gemeinden.map(function(g){ return '<option value="'+g.gemeinde+'">'; }).join('') +
      '</datalist>' +
      '<button id="bubble-search-clear" class="embed-tab" type="button">zurücksetzen</button>' +
    '</div>';
  function setMode(mode){
    document.querySelectorAll('.embed-tab').forEach(function(b){
      b.classList.toggle('active', b.dataset.mode===mode);
    });
    if (mode==='overview')  updateViz(1);
    if (mode==='youngest') {
      var young = DATA.gemeinden.filter(function(g){ return g.avg_age < 42; })
                                .map(function(g){ return g.gemeinde; });
      showViz(); drawBubbles(young, true);
    }
    if (mode==='oldest')    updateViz(3);
    if (mode==='change')    updateViz(6);
  }
  document.querySelectorAll('.embed-tabs .embed-tab').forEach(function(b){
    b.addEventListener('click', function(){ setMode(b.dataset.mode); });
  });
  var searchInput = document.getElementById('bubble-search');
  var allNames = DATA.gemeinden.map(function(g){ return g.gemeinde; });
  var searchedGemeinde = null;
  var origDraw = window.drawBubbles;
  window.drawBubbles = function(highlights, dim, colorFn, year){
    if (searchedGemeinde) {
      return origDraw([searchedGemeinde], true, colorFn, year);
    }
    return origDraw(highlights, dim, colorFn, year);
  };
  function applySearch(){
    var v = searchInput.value.trim();
    if (allNames.indexOf(v) !== -1) {
      searchedGemeinde = v;
      document.querySelectorAll('.embed-tabs .embed-tab').forEach(function(b){ b.classList.remove('active'); });
      showViz(); origDraw([v], true);
    }
  }
  searchInput.addEventListener('change', applySearch);
  searchInput.addEventListener('input', function(){ if (allNames.indexOf(searchInput.value.trim())!==-1) applySearch(); });
  document.getElementById('bubble-search-clear').addEventListener('click', function(){
    searchInput.value = '';
    searchedGemeinde = null;
    setMode('overview');
  });
  // Disable bubble click — hover tooltip is enough; profile lives in Block 2
  window.showGemeindeProfile = function(){ showViz(); };
  // Force viz visible regardless of step transitions
  setTimeout(function(){ setupViz(); setMode('overview'); }, 50);
})();
</script>
