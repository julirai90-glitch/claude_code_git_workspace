<style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 28px 32px; }
  h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .lead { font-size: 14px; color: #555; margin-bottom: 16px; line-height: 1.5; }
  .search-wrap { margin-bottom: 16px; }
  .search-wrap input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: #1E3A5F; }
  .chart-wrap { height: 420px; }
  .highlight-info { font-size: 12px; color: #1E3A5F; margin-top: 8px; min-height: 18px; font-weight: 600; }

</head>

  <p class="source">Bevölkerung 2024 · Statistik Graubünden (dvs_awt_soci_20250507)</p>

<script>

];

let searchTerm = '';

function getColor(item) {
  if (!item || !item._data) return '#1E3A5F';
  const name = item._data.n;
  if (searchTerm && name.toLowerCase().includes(searchTerm)) return '#B5001E';
  return '#1E3A5F';
}

function getBorder(item) {
  if (!item || !item._data) return '#fff';
  const name = item._data.n;
  if (searchTerm && name.toLowerCase().includes(searchTerm)) return '#fff';
  return '#fff';
}

const chart = new Chart(document.getElementById('chart'), {
  type: 'treemap',
  data: {
    datasets: [{
      label: 'Gemeinden',
      tree: DATA,
      key: 'v',
      backgroundColor: function(ctx) { return getColor(ctx.raw); },
      borderWidth: 1,
      borderColor: function(ctx) { return getBorder(ctx.raw); },
      captions: {
        display: true,
        color: '#fff',
        font: { size: 11, family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" },
        formatter: function(ctx) {
          if (!ctx.raw || !ctx.raw._data) return '';
          return ctx.raw.v > 1500 ? ctx.raw._data.n : '';
        }
      }
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#161616', padding: 12,
        titleFont: { size: 13, weight: '600' },
        bodyFont: { size: 12 },
        callbacks: {
          title: function(items) { return items[0]?.raw?._data?.n || ''; },
          label: function(ctx) { return '  ' + (ctx.raw.v || 0).toLocaleString('de-CH') + ' Einwohner:innen'; }
        }
      }
    }
  }
});

document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  const matches = DATA.filter(d => d.n.toLowerCase().includes(searchTerm) && searchTerm);
  const info = document.getElementById('highlight-info');
  if (matches.length === 1) {
    info.textContent = matches[0].n + ': ' + matches[0].v.toLocaleString('de-CH') + ' Einwohner:innen';
  } else if (matches.length > 1) {
    info.textContent = matches.length + ' Gemeinden gefunden';
  } else {
    info.textContent = '';
  }
  chart.update();
});
</script>
</body>
</html>
