<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zweitwohnungen Graubünden — Quote vs. Veränderung 2017→2026</title>
<script src="https://cdn.jsdelivr.net/npm/iframe-resizer@4.3.9/js/iframeResizer.contentWindow.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="zwg_common.js"></script>
<link rel="stylesheet" href="zwg_common.css">
<style>
  #scatter-svg { width: 100%; height: 460px; }
  .threshold { stroke: #B5001E; stroke-width: 1.2; stroke-dasharray: 4,3; }
  .threshold-zero { stroke: #1E3A5F; stroke-width: 1; stroke-dasharray: 4,3; }
  .quad-label { font-size: 10px; fill: #aaa; font-style: italic; }
  .pt { cursor: pointer; }
</style>
</head>
<body>
<div class="zwg-wrap">
  <h2>Zweitwohnungsanteil vs. Veränderung seit 2017</h2>
  <p class="sub">Jeder Punkt = eine Bündner Gemeinde. Y = Anteil zum gewählten Stichtag. X = Veränderung in Prozentpunkten gegenüber März 2017. Punktgrösse = Wohnungen total. Slider bewegen oder Play für Animation.</p>

  <div class="zwg-slider-bar">
    <button class="playbtn" id="playbtn">▶</button>
    <input class="periodSlider" type="range" id="periodSlider" min="0" max="0" value="0" step="1">
    <span class="periodLabel" id="periodLabel">…</span>
  </div>

  <svg id="scatter-svg"></svg>
  <div id="scatter-detail" style="font-size:11px;color:#888;margin-top:8px;">Hover über einen Punkt für Details.</div>

  <div id="source"></div>
</div>

<script>
ZWG.loadData('zweitwohnungen_data.json', document.body, function (DATA) {
  document.getElementById('source').innerHTML = ZWG.footerHTML();

  // Vorberechnung: für jede Erhebung pro Gemeinde {anteil_t, delta_t (gegenüber März 2017), total_t}
  // Bezugspunkt: erst_jahr (= März 2017) jeder Gemeinde.
  // Im GWR sind März- und Oktober-Werte eines Jahres identisch — wir nutzen
  // nur die März-Stände, das gibt 10 Frames (2017–2026).
  var periods = DATA.periods.filter(function (p) { return p.s === 'März'; });
  var snapshots = DATA.gemeinden.map(function (g) {
    var base = g.serie[0]; // März 2017 = erster Eintrag
    var pos = {};
    g.serie.forEach(function (s) {
      pos[s.j + '-' + s.s] = {
        anteil: s.a,
        total:  s.t,
        delta:  +(s.a - base.a).toFixed(2),
        anomaly: ZWG.isAnomaly(g.name, s.j, s.s)
      };
    });
    return { name: g.name, bfs: g.bfs, region: g.region, base_anteil: base.a, pos: pos, einw_2024: g.einw_2024 };
  });

  // Globale Werte-Bereiche über ALLE Erhebungen, damit die Achsen während der
  // Animation nicht springen.
  var allDeltas = [], allAnteile = [], allTotals = [];
  snapshots.forEach(function (s) {
    Object.values(s.pos).forEach(function (p) {
      allDeltas.push(p.delta); allAnteile.push(p.anteil); allTotals.push(p.total);
    });
  });

  var svg = d3.select('#scatter-svg');
  var w = svg.node().clientWidth || 648;
  var h = 460;
  var m = { t: 24, r: 18, b: 44, l: 52 };
  svg.attr('viewBox', '0 0 ' + w + ' ' + h).selectAll('*').remove();

  var xExt = d3.extent(allDeltas);
  var xPad = Math.ceil(Math.max(Math.abs(xExt[0]), Math.abs(xExt[1])) / 5) * 5;
  var yMax = Math.ceil(d3.max(allAnteile) / 10) * 10;

  var x = d3.scaleLinear().domain([-xPad, xPad]).range([m.l, w - m.r]);
  var y = d3.scaleLinear().domain([0, Math.max(yMax, 100)]).range([h - m.b, m.t]);
  var r = d3.scaleSqrt().domain([0, d3.max(allTotals)]).range([5, 18]);

  // Statische Schichten
  svg.append('g').selectAll('line').data(x.ticks(5)).enter().append('line')
    .attr('class', 'zwg-gridline').attr('x1', function (d) { return x(d); }).attr('x2', function (d) { return x(d); }).attr('y1', m.t).attr('y2', h - m.b);
  svg.append('g').selectAll('line').data(y.ticks(5)).enter().append('line')
    .attr('class', 'zwg-gridline').attr('x1', m.l).attr('x2', w - m.r).attr('y1', function (d) { return y(d); }).attr('y2', function (d) { return y(d); });

  svg.append('line').attr('class', 'threshold').attr('x1', m.l).attr('x2', w - m.r).attr('y1', y(20)).attr('y2', y(20));
  svg.append('line').attr('class', 'threshold-zero').attr('x1', x(0)).attr('x2', x(0)).attr('y1', m.t).attr('y2', h - m.b);

  svg.append('text').attr('class', 'quad-label').attr('x', x(0) + 6).attr('y', y(20) - 4).text('über 20 %, steigend');
  svg.append('text').attr('class', 'quad-label').attr('x', x(0) - 6).attr('y', y(20) - 4).attr('text-anchor', 'end').text('über 20 %, sinkend');
  svg.append('text').attr('class', 'quad-label').attr('x', x(0) + 6).attr('y', y(20) + 14).text('unter 20 %, steigend');
  svg.append('text').attr('class', 'quad-label').attr('x', x(0) - 6).attr('y', y(20) + 14).attr('text-anchor', 'end').text('unter 20 %, sinkend');

  svg.append('g').attr('class', 'zwg-axis').attr('transform', 'translate(0,' + (h - m.b) + ')')
    .call(d3.axisBottom(x).ticks(5).tickFormat(function (d) { return (d > 0 ? '+' : '') + d + ' Pp'; }));
  svg.append('g').attr('class', 'zwg-axis').attr('transform', 'translate(' + m.l + ',0)')
    .call(d3.axisLeft(y).ticks(5).tickFormat(function (d) { return d + ' %'; }));

  svg.append('text').attr('x', w / 2).attr('y', h - 6).attr('text-anchor', 'middle').attr('font-size', 11).attr('fill', '#666').text('Veränderung Zweitwohnungsanteil seit März 2017 (Pp)');
  svg.append('text').attr('transform', 'translate(14,' + (h / 2) + ') rotate(-90)').attr('text-anchor', 'middle').attr('font-size', 11).attr('fill', '#666').text('Zweitwohnungsanteil');

  // Spuren-Layer (kommt nach dem Zeichnen unter die Punkte): zeigt die Pfade
  // zwischen erster und aktueller Position für jede Gemeinde, als zarter Hint.
  var trailLayer = svg.append('g').attr('class', 'trails');

  // Punkt-Layer
  var ptLayer = svg.append('g').attr('class', 'points');
  var pts = ptLayer.selectAll('circle').data(snapshots, function (d) { return d.bfs; })
    .enter().append('circle')
    .attr('class', 'pt')
    .attr('fill-opacity', 0.7)
    .attr('stroke', '#fff').attr('stroke-width', 1.2)
    .on('mouseenter', function (evt, d) {
      d3.select(this).attr('stroke', ZWG.MARKEN.blueDark).attr('stroke-width', 2.2);
      var p = d.pos[curKey()];
      if (!p) return;
      ZWG.showTooltip('<strong style="color:' + ZWG.MARKEN.blueDark + '">' + d.name + '</strong>'
        + '<div style="font-size:10px;color:#999;margin:1px 0 4px;">' + d.region + '</div>'
        + '<div class="row2" style="display:flex;justify-content:space-between;gap:8px;"><span style="color:#888">Quote</span><span style="font-weight:600;font-variant-numeric:tabular-nums;">' + ZWG.fmtPct(p.anteil) + '</span></div>'
        + '<div class="row2" style="display:flex;justify-content:space-between;gap:8px;"><span style="color:#888">Δ seit März 2017</span><span style="font-weight:600;font-variant-numeric:tabular-nums;">' + ZWG.fmtPp(p.delta) + '</span></div>'
        + '<div class="row2" style="display:flex;justify-content:space-between;gap:8px;"><span style="color:#888">Wohnungen</span><span style="font-weight:600;font-variant-numeric:tabular-nums;">' + ZWG.fmtN(p.total) + '</span></div>', evt);
    })
    .on('mousemove', ZWG.positionTooltip)
    .on('mouseleave', function () { d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.2); ZWG.hideTooltip(); })
    .on('click', function (evt, d) {
      var p = d.pos[curKey()];
      if (!p) return;
      document.getElementById('scatter-detail').innerHTML =
        '<strong style="color:' + ZWG.MARKEN.blueDark + '">' + d.name + '</strong> '
        + '<span style="color:#999;">(' + d.region + ')</span> · ' + ZWG.fmtPct(p.anteil)
        + ' (' + ZWG.fmtPp(p.delta) + ' seit März 2017) · ' + ZWG.fmtN(p.total) + ' Wohnungen';
      // Pfad einer einzelnen Gemeinde zeigen
      drawTrail(d);
    });

  // Slider/Animation
  var slider = document.getElementById('periodSlider');
  var label = document.getElementById('periodLabel');
  var playBtn = document.getElementById('playbtn');
  slider.max = periods.length - 1;
  slider.value = periods.length - 1;
  var playing = false, timer = null;

  slider.addEventListener('input', frame);
  playBtn.addEventListener('click', function () {
    playing = !playing;
    this.textContent = playing ? '⏸' : '▶';
    if (playing) {
      timer = setInterval(function () {
        var v = (+slider.value + 1) % periods.length;
        slider.value = v; frame();
      }, 700);
    } else { clearInterval(timer); }
  });

  function curKey() {
    var i = +slider.value;
    var p = periods[i];
    return p.j + '-' + p.s;
  }

  function frame() {
    var i = +slider.value;
    var p = periods[i];
    label.textContent = p.s + ' ' + p.j;

    pts.transition().duration(550).ease(d3.easeCubicInOut)
      .attr('cx', function (d) { var pp = d.pos[curKey()]; return pp ? x(pp.delta) : x(0); })
      .attr('cy', function (d) { var pp = d.pos[curKey()]; return pp ? y(pp.anteil) : y(0); })
      .attr('r',  function (d) { var pp = d.pos[curKey()]; return pp ? r(pp.total) : 5; })
      .attr('fill', function (d) { var pp = d.pos[curKey()]; return pp ? ZWG.colorForAnteil(pp.anteil) : '#ccc'; });
  }

  function drawTrail(g) {
    trailLayer.selectAll('*').remove();
    // Nur März-Stände, chronologisch sortiert
    var pts2 = periods.map(function (p) { return g.pos[p.j + '-' + p.s]; }).filter(Boolean);
    var line = d3.line()
      .x(function (p) { return x(p.delta); })
      .y(function (p) { return y(p.anteil); })
      .curve(d3.curveMonotoneX);
    trailLayer.append('path').datum(pts2)
      .attr('fill', 'none').attr('stroke', ZWG.MARKEN.blueDark)
      .attr('stroke-width', 1.5).attr('stroke-dasharray', '3,2')
      .attr('opacity', 0.5).attr('d', line);
  }

  frame(); // initial
});
</script>
</body>
</html>
